---
# ==============================================================================
# Playbook: F5 Pool Member Management
# Job Template entrypoint — called by EDA via ServiceNow change record event
# ==============================================================================

- name: F5 Pool Member Management via ServiceNow Change Record
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    f5_provider:
      server:         "{{ f5_host }}"
      server_port:    "{{ f5_port | default(443) }}"
      user:           "{{ f5_username }}"
      password:       "{{ f5_password }}"
      validate_certs: "{{ f5_validate_certs | default(true) }}"
      transport:      rest
      no_f5_tocks:    true

    # Normalised inputs
    action:          "{{ snow_action | lower | trim }}"
    vm_name:         "{{ snow_vm_name | trim }}"
    vm_address:      "{{ snow_vm_address | trim }}"
    vm_port:         "{{ snow_vm_port | int }}"
    partition:       "{{ snow_f5_partition | default('Common') | trim }}"
    pool_name:       "{{ snow_f5_pool_name | trim }}"
    member_ratio:    "{{ snow_pool_member_ratio | default(1) | int }}"
    member_priority: "{{ snow_pool_member_priority | default(0) | int }}"
    change_number:   "{{ snow_change_number | trim }}"

  pre_tasks:
    - name: Validate required input variables
      ansible.builtin.assert:
        that:
          - snow_change_number is defined and snow_change_number | length > 0
          - snow_action is defined and snow_action | lower in ['add', 'delete']
          - snow_vm_name is defined and snow_vm_name | length > 0
          - snow_vm_address is defined
          - snow_vm_address | ansible.utils.ipaddr('address') is truthy
          - snow_vm_port is defined
          - snow_vm_port | int > 0 and snow_vm_port | int < 65536
          - snow_f5_pool_name is defined and snow_f5_pool_name | length > 0
          - f5_host is defined and f5_host | length > 0
          - f5_username is defined
          - f5_password is defined
        fail_msg: >
          Input validation failed for change {{ snow_change_number | default('UNKNOWN') }}.
          Required: snow_action (add|delete), snow_vm_name, snow_vm_address (valid IP),
          snow_vm_port (1-65535), snow_f5_pool_name, f5_host, f5_username, f5_password.
        success_msg: "Validation passed — Change: {{ snow_change_number }}, Action: {{ action | upper }}"

    - name: Log job parameters
      ansible.builtin.debug:
        msg:
          - "====================================================="
          - " F5 Pool Member Management"
          - "====================================================="
          - "Change Number : {{ change_number }}"
          - "Action        : {{ action | upper }}"
          - "VM            : {{ vm_name }} ({{ vm_address }}:{{ vm_port }})"
          - "F5 Host       : {{ f5_host }}"
          - "Pool          : /{{ partition }}/{{ pool_name }}"
          - "====================================================="

    - name: Verify target F5 pool exists
      f5networks.f5_modules.bigip_pool_facts:
        provider:     "{{ f5_provider }}"
        filter_name:  "{{ pool_name }}"
        partition:    "{{ partition }}"
      register: pool_facts
      failed_when: pool_facts.ltm_pools | length == 0

  tasks:
    - name: Execute F5 pool member role
      ansible.builtin.include_role:
        name: f5_pool_member
      vars:
        role_action:       "{{ action }}"
        role_vm_name:      "{{ vm_name }}"
        role_vm_address:   "{{ vm_address }}"
        role_vm_port:      "{{ vm_port }}"
        role_partition:    "{{ partition }}"
        role_pool_name:    "{{ pool_name }}"
        role_ratio:        "{{ member_ratio }}"
        role_priority:     "{{ member_priority }}"
        role_change_number: "{{ change_number }}"
        role_f5_provider:  "{{ f5_provider }}"

  post_tasks:
    - name: Verify and save F5 config
      ansible.builtin.include_role:
        name: f5_pool_member
        tasks_from: verify
      vars:
        role_partition:   "{{ partition }}"
        role_pool_name:   "{{ pool_name }}"
        role_f5_provider: "{{ f5_provider }}"

    - name: Update ServiceNow change record — Success
      ansible.builtin.include_role:
        name: snow_update
      vars:
        snow_update_state: "implement"
        snow_update_notes: >
          Ansible AAP completed successfully.
          Action: {{ action | upper }}
          VM: {{ vm_name }} ({{ vm_address }}:{{ vm_port }})
          Pool: /{{ partition }}/{{ pool_name }}
          Timestamp: {{ lookup('pipe','date -u +%Y-%m-%dT%H:%M:%SZ') }}
      when:
        - snow_host is defined
        - snow_username is defined
        - snow_password is defined

  rescue:
    - name: Update ServiceNow change record — Failure
      ansible.builtin.include_role:
        name: snow_update
      vars:
        snow_update_state: "open"
        snow_update_notes: >
          Ansible AAP FAILED.
          Action: {{ action | upper }}
          VM: {{ vm_name }} ({{ vm_address }}:{{ vm_port }})
          Pool: /{{ partition }}/{{ pool_name }}
          Error: {{ ansible_failed_result.msg | default('Unknown error') }}
          Timestamp: {{ lookup('pipe','date -u +%Y-%m-%dT%H:%M:%SZ') }}
      when:
        - snow_host is defined
        - snow_username is defined
        - snow_password is defined
      ignore_errors: true

    - name: Fail the play with a clear error message
      ansible.builtin.fail:
        msg: >
          F5 pool member management FAILED for change {{ change_number }}.
          Action: {{ action | upper }}, VM: {{ vm_name }}, Pool: {{ pool_name }}.
