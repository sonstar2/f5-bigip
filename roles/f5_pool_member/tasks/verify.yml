- name: Save F5 running configuration
  f5networks.f5_modules.bigip_config:
    provider: "{{ role_f5_provider }}"
    save:     true
  register: save_result

- name: Confirm config saved
  ansible.builtin.debug:
    msg: "F5 configuration saved to disk successfully."
  when: save_result is succeeded
